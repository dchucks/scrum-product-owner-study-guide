[[faqs]]
question = "Is this an official certification body study guide?"
answer   = "No. This is an independent, unofficial guide created by a practitioner. It is not endorsed by or affiliated with any certification body. All content is original and based on the author's extensive real-world experience as a Product Owner and Agile coach."

[[faqs]]
question = "Is this book suitable for beginners?"
answer   = "Basic familiarity with Agile concepts is helpful but not required. The guide introduces all Scrum concepts clearly while focusing on the strategic depth needed to truly excel as a Product Owner — not just pass an exam."

[[faqs]]
question = "How is this different from other Product Owner books?"
answer   = "This isn't a textbook — it's a practitioner-led field guide. The focus is on the entrepreneurial mindset and strategic thinking that distinguishes great Product Owners from mere Scribes and Proxies. It covers exam preparation AND real-world application in equal measure."

[[faqs]]
question = "Will this help me pass the certification exam?"
answer   = "The guide is structured around the 12 core competency focus areas of the Scrum Product Owner certification, includes a full-length 80-question practice test at 85% difficulty, and provides a proven 7-day study plan."

[[faqs]]
question = "Does it cover scaling Scrum?"
answer   = "Yes. The appendix covers scaling frameworks including Nexus, and the main content includes guidance on managing a single Product Backlog across multiple Scrum Teams."

[[faqs]]
question = "Can I buy this for my team?"
answer   = "Absolutely. Bulk purchase options are available. Contact the author directly via the link below for team pricing."

[[faqs]]
question = "Is the eBook the same content as the paperback?"
answer   = "Yes — both versions contain identical content. Choose based on your reading preference: instant digital access or the physical reading experience."