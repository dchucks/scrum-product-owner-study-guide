[[items]]
title = "12 Focus Area Chapters"
description = "One chapter per certification competency, each structured as: concept explanation, what you need to know for the exam, and practice questions with full answer rationale."

[[items]]
title = "7-Day Study Plan"
description = "A day-by-day schedule with specific reading targets, question counts, and must-memorise vs must-internalise distinctions for every day of preparation."

[[items]]
title = "Cram Sheets"
description = "Over a dozen visual revision sheet, each designed for rapid last-minute review of definitions, rules, and examiner traps for each competency."

[[items]]
title = "Practice Questions Throughout"
description = "Over two dozen focus-area questions embedded in the chapters, each with a full explanation of why the correct answer is right and why the distractors are wrong."

[[items]]
title = "80-Question, full-length, Practice Test"
description = "A complete mock exam at the end of the guide, timed for 60 minutes, with answer explanations referenced back to the relevant chapter sections."

[[items]]
title = "Practitioner Frameworks Brief"
description = "A quick-reference table mapping industry frameworks (PR/FAQ, Two-Way Door, HEART, OKRs, strategy stack) to the specific exam focus areas where each is most relevant."

