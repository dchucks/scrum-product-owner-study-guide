[params.author]
name = "Debashish Chakrabarty"
image = "/images/author-photo.png"
bio = "Debashish Chakrabarty is a Senior Technical Program Manager at Amazon with over 24 years of experience delivering complex, large-scale software systems. He brings firsthand practitioner perspective to bridge the gap between certification preparation and how product ownership works at scale in real organisations. A certified PMP, Scrum Master (CSM), and Product Owner (PSPO-I), he has spent decades leading distributed Agile teams, driving cloud-native development, and orchestrating enterprise-level Agile transformations."
bio2 = "Through his writing at the 'Agile Chronicles', he distills hard-won lessons from high-stakes environments into practical, actionable guidance that teams can apply immediately. In this guide, he leverages his extensive background to help professionals move beyond theory and master the entrepreneurial leadership required to succeed in the modern product landscape."

